<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Results | Wine Quality</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            wine: {
              50: '#fdf2f4',
              100: '#fce7eb',
              200: '#f8d0d9',
              300: '#f2a9ba',
              400: '#e97592',
              500: '#d9466b',
              600: '#c2185b',
              700: '#a3154d',
              800: '#881442',
              900: '#74163c',
              950: '#4A0E24',
            },
            gold: {
              400: '#E8D5A3',
              500: '#C9A84C',
              600: '#B8943F',
            }
          }
        }
      }
    }
  </script>
  
  <style>
    body { margin: 0; background: #0a0a0a; overflow-x: hidden; }
    #canvas-container { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    
    .glass-panel {
      background: rgba(20, 6, 12, 0.7);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(201, 168, 76, 0.2);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #C9A84C 0%, #E8D5A3 50%, #C9A84C 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .result-glow {
      box-shadow: 0 0 100px rgba(201, 168, 76, 0.3);
    }
    
    .meter-fill {
      transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen relative">

  <div id="canvas-container"></div>
  
  <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
      
      <!-- Result Card -->
      <div class="glass-panel rounded-3xl p-8 sm:p-12 text-center opacity-0" id="result-card">
        
        <!-- Success Icon -->
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-gradient-to-br from-wine-600 to-wine-800 flex items-center justify-center result-glow opacity-0 scale-0" id="success-icon">
          <i data-lucide="check-circle" class="w-10 h-10 text-gold-500"></i>
        </div>
        
        <h1 class="text-3xl sm:text-4xl font-display font-bold mb-2 opacity-0" id="result-title">
          Prediction <span class="gradient-text">Complete</span>
        </h1>
        
        <p class="text-gray-400 mb-8 opacity-0" id="result-subtitle">Based on the chemical properties analyzed</p>
        
        <!-- Quality Score -->
        <div class="mb-8 opacity-0" id="score-container">
          <div class="text-6xl sm:text-7xl font-display font-bold gradient-text mb-2" id="quality-score">
            {{ prediction }}
          </div>
          <div class="text-sm text-gray-500 uppercase tracking-widest">Quality Score</div>
        </div>
        
        <!-- Quality Meter -->
        <div class="mb-8 opacity-0" id="meter-container">
          <div class="h-4 bg-black/30 rounded-full overflow-hidden border border-white/10">
            <div class="h-full bg-gradient-to-r from-wine-800 via-wine-600 to-gold-500 meter-fill" id="quality-meter" style="width: 0%"></div>
          </div>
          <div class="flex justify-between text-xs text-gray-500 mt-2">
            <span>Poor</span>
            <span>Average</span>
            <span>Excellent</span>
          </div>
        </div>
        
        <!-- Interpretation -->
        <div class="glass-panel rounded-2xl p-6 mb-8 opacity-0" id="interpretation">
          <div class="flex items-center gap-3 mb-3">
            <i data-lucide="info" class="w-5 h-5 text-gold-500"></i>
            <h3 class="font-semibold text-white">Analysis</h3>
          </div>
          <p class="text-gray-400 text-sm leading-relaxed" id="analysis-text">
            Calculating wine characteristics...
          </p>
        </div>
        
        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center opacity-0" id="actions">
          <a href="/" class="px-8 py-3 rounded-full bg-white/5 border border-white/10 text-white font-medium hover:bg-white/10 transition-all flex items-center justify-center gap-2 group">
            <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
            New Prediction
          </a>
          <button onclick="window.print()" class="px-8 py-3 rounded-full bg-gradient-to-r from-wine-600 to-wine-800 text-white font-medium hover:shadow-lg hover:shadow-wine-600/30 transition-all flex items-center justify-center gap-2">
            <i data-lucide="download" class="w-4 h-4"></i>
            Save Result
          </button>
        </div>
        
      </div>
      
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    // Parse prediction value
    const predictionValue = parseFloat("{{ prediction }}") || 0;
    const percentage = (predictionValue / 10) * 100;
    
    // Quality interpretation
    const getInterpretation = (score) => {
      if(score >= 7) return "This wine exhibits exceptional characteristics with well-balanced acidity, optimal alcohol content, and excellent chemical composition. Highly recommended for premium collections.";
      if(score >= 5) return "A good quality wine with decent balance. Suitable for immediate consumption and offers fair value. Some minor improvements in chemical properties could enhance quality.";
      return "This sample shows basic wine characteristics. May benefit from aging or blending processes to improve overall quality and taste profile.";
    };
    
    document.getElementById('analysis-text').textContent = getInterpretation(predictionValue);
    
    // Three.js Background
    const initThreeJS = () => {
      const container = document.getElementById('canvas-container');
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);
      
      const geometry = new THREE.BufferGeometry();
      const count = 100;
      const positions = new Float32Array(count * 3);
      
      for(let i = 0; i < count * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 10;
      }
      
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      
      const material = new THREE.PointsMaterial({
        size: 0.03,
        color: 0xC9A84C,
        transparent: true,
        opacity: 0.4
      });
      
      const particles = new THREE.Points(geometry, material);
      scene.add(particles);
      
      camera.position.z = 5;
      
      const animate = () => {
        requestAnimationFrame(animate);
        particles.rotation.y += 0.001;
        renderer.render(scene, camera);
      };
      
      animate();
    };
    
    // GSAP Animations
    const tl = gsap.timeline({ defaults: { ease: "power3.out" } });
    
    tl.to("#result-card", { opacity: 1, duration: 0.8, delay: 0.2 })
      .to("#success-icon", { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.7)" }, "-=0.4")
      .to("#result-title", { opacity: 1, y: 0, duration: 0.6 }, "-=0.3")
      .to("#result-subtitle", { opacity: 1, y: 0, duration: 0.6 }, "-=0.4")
      .to("#score-container", { opacity: 1, y: 0, duration: 0.6 }, "-=0.3")
      .to("#meter-container", { opacity: 1, y: 0, duration: 0.6 }, "-=0.3")
      .to("#interpretation", { opacity: 1, y: 0, duration: 0.6 }, "-=0.3")
      .to("#actions", { opacity: 1, y: 0, duration: 0.6 }, "-=0.3");
    
    // Animate meter fill
    setTimeout(() => {
      document.getElementById('quality-meter').style.width = percentage + '%';
    }, 1000);
    
    // Animate score counter
    const scoreElement = document.getElementById('quality-score');
    const targetScore = predictionValue;
    let currentScore = 0;
    
    const updateScore = () => {
      if(currentScore < targetScore) {
        currentScore += 0.1;
        scoreElement.textContent = currentScore.toFixed(1);
        requestAnimationFrame(updateScore);
      } else {
        scoreElement.textContent = targetScore.toFixed(1);
      }
    };
    
    setTimeout(updateScore, 500);
    
    window.addEventListener('load', initThreeJS);
  </script>

</body>
</html>
